# DEG Mods node + Caddy (automatic HTTPS). Run from this directory:
#
#   docker compose up -d
#
# The first deploy builds the node image from the source in the parent dir.
# Once you publish an image (e.g. to GHCR), replace the `build:` block with
#   image: ghcr.io/degmods/node:latest
# and a new operator can run THIS FILE ALONE — nothing else on their machine.
services:
  node:
    build:
      context: ..            # node/ (where the Dockerfile lives)
    restart: unless-stopped
    env_file: .env           # R2_ACCESS_KEY / R2_SECRET_KEY  (or S3_ACCESS_KEY / S3_SECRET_KEY)
    volumes:
      - ./data:/app/data                       # identity key, event store, ad metrics, (disk) blobs
      - ./config.yml:/app/config.yml:ro        # your config (no secrets — those come from .env)
    expose:
      - "3000"               # internal only; Caddy is the public entrypoint

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - node
    ports:
      - "80:80"              # needed for the Let's Encrypt HTTP challenge
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # persists issued certificates
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
